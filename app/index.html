<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>everyday knobs — ノブ・ジェネレーター</title>
    <script>
      // Set the theme before first paint to avoid a flash of the wrong palette.
      try {
        var t = localStorage.getItem("everyday-knobs.theme");
        if (t !== "light" && t !== "dark") {
          t = window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
        }
        document.documentElement.dataset.theme = t;
        var a = localStorage.getItem("everyday-knobs.accent");
        if (a) {
          var h = a.replace("#", "");
          var r = parseInt(h.slice(0, 2), 16),
            g = parseInt(h.slice(2, 4), 16),
            b = parseInt(h.slice(4, 6), 16);
          var lum = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
          document.documentElement.style.setProperty("--accent", a);
          document.documentElement.style.setProperty("--accent-text", lum > 0.62 ? "#22252b" : "#ffffff");
        }
      } catch (e) {
        document.documentElement.dataset.theme = "dark";
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
